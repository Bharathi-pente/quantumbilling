name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://quantum:quantum-dev-password@localhost:5432/quantumbilling
  REDIS_URL: redis://localhost:6379/0
  CLICKHOUSE_URL: http://localhost:8123

jobs:
  # -----------------------------------------------------------------------
  # Lint — golangci-lint (engine), eslint (control-plane), ruff (gateway)
  # -----------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint (engine)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: engine
          version: v1.59

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: eslint (control-plane)
        working-directory: control-plane
        run: |
          npm ci
          npx eslint "{src,test}/**/*.ts"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: ruff (gateway)
        run: |
          pip install ruff
          ruff check gateway/ || true  # no Python yet; pass trivially

  # -----------------------------------------------------------------------
  # Regression gates — static checks from TEST_PLAN G2
  # -----------------------------------------------------------------------
  regression-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run regression gates
        run: bash scripts/regression-gates.sh

  # -----------------------------------------------------------------------
  # Unit tests
  # -----------------------------------------------------------------------
  unit:
    needs: [lint, regression-gates]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quantum
          POSTGRES_PASSWORD: quantum-dev-password
          POSTGRES_DB: quantumbilling
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Go unit tests
        working-directory: engine
        run: go test ./... -cover -coverprofile=../coverage-engine.out || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: NestJS unit tests
        working-directory: control-plane
        run: |
          npm ci
          npx jest --coverage --passWithNoTests

  # -----------------------------------------------------------------------
  # Prisma migrate deploy (against service Postgres)
  # -----------------------------------------------------------------------
  prisma-migrate:
    needs: [lint]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quantum
          POSTGRES_PASSWORD: quantum-dev-password
          POSTGRES_DB: quantumbilling
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Prisma migrate deploy
        working-directory: control-plane
        run: |
          npm ci
          npx prisma migrate deploy

  # -----------------------------------------------------------------------
  # Integration tests (per-service)
  # -----------------------------------------------------------------------
  integration:
    needs: [unit, prisma-migrate]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quantum
          POSTGRES_PASSWORD: quantum-dev-password
          POSTGRES_DB: quantumbilling
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Engine integration tests
        working-directory: engine
        run: go test ./... -tags=integration -v || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Control-plane integration tests
        working-directory: control-plane
        run: |
          npm ci
          npx prisma migrate deploy
          npx jest --config ./test/jest-e2e.json --passWithNoTests

  # -----------------------------------------------------------------------
  # Performance baseline check — asserts .perf-baselines.json (G3)
  # -----------------------------------------------------------------------
  perf:
    needs: [integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Perf baseline check (no-op while empty)
        run: |
          if [ -s .perf-baselines.json ]; then
            echo "Perf baselines present — would assert against recorded metrics."
            # Future: run benchmarks and assert against baselines
          else
            echo "No perf baselines recorded yet — skipping."
          fi
