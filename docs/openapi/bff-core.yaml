      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: period_start
          in: query
          schema: { type: string, format: date-time }
        - name: period_end
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Team usage summary (proxied from the analytics API)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UsageSummary"
                  - type: object
                    properties:
                      customers:
                        type: array
                        description: >
                          Per-customer usage rows; field-level shape per
                          `openapi/analytics.yaml`
                          `/v1/orgs/{org_id}/customers/usage`.
                        items:
                          type: object
                          additionalProperties: true
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Analytics API unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }


