        `GET /v1/orgs/{org_id}/summary` and
        `GET /v1/orgs/{org_id}/customers/usage` — see
        `openapi/analytics.yaml` for the authoritative upstream response
        schemas. Returns a compact `UsageSummary` plus per-customer rows.
