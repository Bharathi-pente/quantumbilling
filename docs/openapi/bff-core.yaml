          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaxExemption" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Invalid status transition (e.g. revoked exemption cannot be re-verified)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /customers/{customerId}/tax-ids:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
    get:
      tags: [Tax & Currency]
      operationId: listCustomerTaxIds
      summary: List a customer's tax IDs
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      responses:
        "200":
          description: Customer tax IDs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CustomerTaxId" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      tags: [Tax & Currency]
      operationId: upsertCustomerTaxIds
      summary: Set the customer's tax IDs (VAT numbers validated, e.g. VIES)
      description: >-
        Validated tax IDs appear on invoices and drive VAT reverse-charge
        annotation at finalization (CR-7).
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/CustomerTaxIdUpsert" }
      responses:
        "200":
          description: Tax IDs replaced
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CustomerTaxId" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /customers/{customerId}/portal-summary:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
    get:
      tags: [Customer Portal]
      operationId: getCustomerPortalSummary
      summary: Customer portal composite summary
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      responses:
        "200":
          description: Customer portal summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerPortalComposite" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /assistant/chat/stream:
    post:
      tags: [AI Assistant]
      operationId: streamAssistantChat
      summary: Stream AI assistant/chatbot responses over SSE
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssistantChatRequest" }
      responses:
        "200":
          description: Server-sent assistant response stream
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE frames carrying AssistantMessage JSON payloads
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /organizations/{orgId}/recommendations:
    parameters:
      - $ref: "#/components/parameters/OrgId"
    get:
      tags: [AI Assistant]
      operationId: listRecommendations
      summary: List AI recommendations
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [open, applied, dismissed] }
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Recommendation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /recommendations/{recommendationId}/apply:
    parameters:
      - $ref: "#/components/parameters/RecommendationId"
    post:
      tags: [AI Assistant]
      operationId: applyRecommendation
      summary: Apply an AI recommendation
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecommendationAction" }
      responses:
        "200":
          description: Recommendation applied
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Recommendation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /recommendations/{recommendationId}/dismiss:
    parameters:
      - $ref: "#/components/parameters/RecommendationId"
    post:
      tags: [AI Assistant]
      operationId: dismissRecommendation
      summary: Dismiss an AI recommendation
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecommendationAction" }
      responses:
        "200":
          description: Recommendation dismissed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Recommendation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Keycloak-issued JWT (realm `quantumbilling`). Roles carried in the
        token: SUPER_ADMIN, ORG_ADMIN, CUSTOMER, END_USER, DEVELOPER. NestJS
        guards enforce per-endpoint roles (documented via `x-guard`).
    meterApiKey:
      type: apiKey
      in: header
      name: X-Meter-Api-Key
      description: >
        Meter API key for the event-ingest facade only. Resolves org scope;
        validated by `MeterApiKeyGuard`.

  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    OrgId:
      name: orgId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CustomerId:
      name: customerId
      in: path
      required: true
      schema: { type: string, format: uuid }
    EndUserId:
      name: endUserId
      in: path
      required: true
      schema: { type: string, format: uuid }
    MeterId:
      name: meterId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PlanId:
      name: planId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RateCardId:
      name: rateCardId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ContractId:
      name: contractId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SubscriptionId:
      name: subscriptionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PaymentMethodId:
      name: pmId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CreditId:
      name: creditId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReratingRunId:
      name: reratingRunId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PeriodId:
      name: periodId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SimulationRunId:
      name: simulationRunId
      in: path
      required: true
      schema: { type: string, format: uuid }
    BillingGroupId:
      name: billingGroupId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ExportConfigId:
      name: exportConfigId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ExemptionId:
      name: exemptionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    WebhookId:
      name: webhookId
      in: path
      required: true
      schema: { type: string, format: uuid }
    DeliveryId:
      name: deliveryId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AlertRuleId:
      name: alertRuleId
      in: path
      required: true
      schema: { type: string, format: uuid }
    GdprRequestId:
      name: gdprRequestId
      in: path
      required: true
      schema: { type: string, format: uuid }
    WorkflowTaskId:
      name: workflowTaskId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ApiKeyId:
      name: apiKeyId
      in: path
      required: true
      schema: { type: string, format: uuid }
    EntitlementId:
      name: entitlementId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PolicyId:
      name: policyId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RuleId:
      name: ruleId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RecommendationId:
      name: recommendationId
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but the guard rejects the caller's role/scope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found (or outside the caller's scope)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    # ─── Shared ───
    Decimal:
      type: string
      format: decimal-string
      pattern: '^-?\d+(\.\d+)?$'
      description: >
        Base-10 decimal serialized as a string. Use for Decimal(38,9)
        quantities/percentages to avoid binary floating-point drift on the wire.
      examples: ["123.456789123"]
    Money:
      allOf:
        - $ref: "#/components/schemas/Decimal"
      description: >
        Monetary amount, unit price, balance, tax amount, credit amount, revenue,
        cost, commit, or price serialized as a decimal string. Currency is carried
        in adjacent currency fields or inherited from the resource.
      examples: ["123.45"]
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code (e.g. DUPLICATE_EVENT, METER_INACTIVE, FORBIDDEN)
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    PaginatedList:
      type: object
      properties:
        items:
          type: array
          items: {}
        total_count: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        has_next_page: { type: boolean }

    # ─── Enums (canonical per ERD.md conflict register) ───
    OrgStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, DELETED]
      description: C-14 — status is stored; trial state lives on subscriptions
    CustomerStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, CHURNED]
      description: C-16
    EndUserStatus:
      type: string
      enum: [active, suspended, canceled]
    MeterStatus:
      type: string
      enum: [DRAFT, ACTIVE, INACTIVE]
    MeterAggregation:
      type: string
      enum: [SUM, COUNT, AVG, GAUGE]
    ProductStatus:
      type: string
      enum: [DRAFT, ACTIVE, INACTIVE, ARCHIVED]
    CatalogStatus:
      type: string
      enum: [DRAFT, ACTIVE, ARCHIVED]
    PricingType:
      type: string
      enum: [FLAT, PER_UNIT, TIERED_GRADUATED, TIERED_VOLUME, PACKAGE, MATRIX, COST_PLUS]
      description: CR-3 expanded pricing coverage
    TokenType:
      type: string
      enum: [input, output, cached, thinking]
      description: CR-3 matrix-pricing dimension
    ContractStatus:
      type: string
      enum: [DRAFT, ACTIVE, EXPIRED, TERMINATED]
    BillingPeriod:
      type: string
      enum: [MONTHLY, QUARTERLY, YEARLY]
    SubscriptionStatus:
      type: string
      enum: [scheduled, trialing, active, past_due, suspended, canceled, ended]
      description: C-12 — lowercase set on customer.subscriptions
    InvoiceStatus:
      type: string
      enum: [draft, pending, paid, overdue, voided]
      description: C-4 — canonical lowercase set
    LineType:
      type: string
      enum: [BASE_FEE, USAGE, OVERAGE, COMMIT_TRUE_UP, SEAT, ADJUSTMENT]
      description: ADR-001 §3 typed line items
    RateSource:
      type: string
      enum: [contract_rate, rate_card_version, pricing_model]
      description: ADR-001 §3.3 rating waterfall — resolved source recorded per line
    PaymentStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED]
    CollectionMode:
      type: string
      enum: [auto_charge, manual, wire]
      description: CR-6 — auto_charge is reserved for the Go billing worker
    PaymentMethodType:
      type: string
      enum: [CARD, ACH, WIRE, BANK_TRANSFER, OTHER]
    CreditNoteStatus:
      type: string
      enum: [draft, issued, applied, refunded]
      description: CR-4 credit-note state machine
    CreditType:
      type: string
      enum: [compensation, promotional, prepaid, commit]
      description: FEFO within ascending priority (compensation=0 … commit=3)
    CreditStatus:
      type: string
      enum: [active, exhausted, expired, revoked]
    WalletStatus:
      type: string
      enum: [active, frozen, closed]
    WalletTransactionType:
      type: string
      enum: [topup, auto_topup, burndown, refund, adjustment]

    # ─── Identity ───
    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        billing_email: { type: [string, "null"], format: email }
        currency: { type: [string, "null"] }
        country: { type: [string, "null"] }
        industry: { type: [string, "null"] }
        timezone: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/OrgStatus" }
        suspended_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
    OrganizationCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        billing_email: { type: string, format: email }
        currency: { type: string }
        country: { type: string }
        industry: { type: string }
        timezone: { type: string }
    OrganizationUpdate:
      type: object
      properties:
        name: { type: string }
        billing_email: { type: string, format: email }
        currency: { type: string }
        country: { type: string }
        industry: { type: string }
        timezone: { type: string }

    # ─── Customer ───
    Customer:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        email: { type: [string, "null"], format: email }
        billing_email: { type: [string, "null"], format: email }
        billing_address: { type: [object, "null"] }
        credit_balance: { $ref: "#/components/schemas/Money" }
        health_score: { type: [integer, "null"] }
        status: { $ref: "#/components/schemas/CustomerStatus" }
        created_at: { type: string, format: date-time }
    CustomerCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        billing_email: { type: string, format: email }
        billing_address: { type: object }
    CustomerUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        billing_email: { type: string, format: email }
        billing_address: { type: object }
        status: { $ref: "#/components/schemas/CustomerStatus" }
    Contact:
      type: object
      properties:
        id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        email: { type: string, format: email }
        designation: { type: [string, "null"] }
        is_primary: { type: boolean }
    ContactCreate:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        designation: { type: string }
        is_primary: { type: boolean, default: false }

    # ─── End user ───
    EndUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        external_user_id: { type: [string, "null"] }
        name: { type: [string, "null"] }
        email: { type: [string, "null"], format: email }
        status: { $ref: "#/components/schemas/EndUserStatus" }
        metadata: { type: [object, "null"] }
        created_at: { type: string, format: date-time }
    EndUserCreate:
      type: object
      required: [email]
      properties:
        external_user_id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        metadata: { type: object }
    EndUserUpdate:
      type: object
      properties:
        external_user_id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        metadata: { type: object }

    # ─── Meter ───
    Meter:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        event_type:
          type: string
          description: NOT meter_type (C-15); supports outcome/agent-action events (CR-10)
        aggregation: { $ref: "#/components/schemas/MeterAggregation" }
        field: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/MeterStatus" }
        last_event_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MeterCreate:
      type: object
      required: [name, event_type, aggregation]
      properties:
        name: { type: string }
        event_type: { type: string }
        aggregation: { $ref: "#/components/schemas/MeterAggregation" }
        field: { type: string }
    MeterEventIngest:
      type: object
      required: [value, timestamp, idempotency_key]
      properties:
        value: { $ref: "#/components/schemas/Decimal" }
        timestamp: { type: string, format: date-time }
        idempotency_key:
          type: string
          description: Namespaced to the meter → engine `event_id`; deduped in Redis (SETNX, 24h TTL)

    # ─── Catalog ───
    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        product_code:
          type: string
          description: SKU — NOT sku; unique(org_id, product_code)
        product_name:
          type: string
          description: NOT name
        description: { type: [string, "null"] }
        product_type:
          type: string
          enum: [STANDALONE, ADD_ON, BUNDLE]
        billing_model:
          type: string
          enum: [SUBSCRIPTION, USAGE_BASED, ONE_TIME, HYBRID]
        status: { $ref: "#/components/schemas/ProductStatus" }
        is_public: { type: boolean }
        metadata: { type: [object, "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProductCreate:
      type: object
      required: [product_code, product_name, product_type, billing_model]
      properties:
        product_code: { type: string }
        product_name: { type: string }
        description: { type: string }
        product_type:
          type: string
          enum: [STANDALONE, ADD_ON, BUNDLE]
        billing_model:
          type: string
          enum: [SUBSCRIPTION, USAGE_BASED, ONE_TIME, HYBRID]
        is_public: { type: boolean, default: false }
        metadata: { type: object }
    ProductUpdate:
      type: object
      properties:
        product_name: { type: string }
        description: { type: string }
        status: { $ref: "#/components/schemas/ProductStatus" }
        is_public: { type: boolean }
        metadata: { type: object }

    Plan:
      type: object
      properties:
        id: { type: string, format: uuid }
        product_id: { type: [string, "null"], format: uuid }
        name: { type: string }
        slug: { type: string }
        billing_period: { $ref: "#/components/schemas/BillingPeriod" }
        trial_days:
          type: [integer, "null"]
          description: CR-14 trials
        base_amount:
          $ref: "#/components/schemas/Money"
          description: NOT base_price (C-5)
        currency: { type: string }
        pay_in_advance: { type: boolean }
        is_active: { type: boolean }
        recurring_grant:
          type: [object, "null"]
          description: CR-14 — monthly included credits, reset on anniversary
        seat_included:
          type: [integer, "null"]
          description: CR-3 per-seat pricing
        seat_price: { oneOf: [{ $ref: "#/components/schemas/Money" }, { type: "null" }] }
        charges:
          type: array
          items: { $ref: "#/components/schemas/Charge" }
    PlanCreate:
      type: object
      required: [name, slug, billing_period, base_amount, currency]
      properties:
        name: { type: string }
        slug: { type: string }
        billing_period: { $ref: "#/components/schemas/BillingPeriod" }
        base_amount: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        pay_in_advance: { type: boolean, default: false }
        trial_days: { type: integer }
        pricing_model_id: { type: string, format: uuid }
        product_id: { type: string, format: uuid }
    Charge:
      type: object
      properties:
        id: { type: string, format: uuid }
        plan_id: { type: string, format: uuid }
        meter_id: { type: string, format: uuid }
        name: { type: string }
        charge_model: { $ref: "#/components/schemas/PricingType" }
        included_units:
          oneOf:
            - $ref: "#/components/schemas/Decimal"
            - type: "null"
          description: Allowance before overage (ADR-001 §3)
        pay_in_advance: { type: boolean }
        is_active: { type: boolean }

    PricingModel:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        meter_id: { type: [string, "null"], format: uuid }
        name: { type: string }
        pricing_type: { $ref: "#/components/schemas/PricingType" }
        config:
          type: [object, "null"]
          description: Matrix dimensions (model × token_type), package size/rounding, markup pct
        minimum_amount:
          oneOf:
            - $ref: "#/components/schemas/Money"
            - type: "null"
          description: CR-3 per-period minimum
        maximum_amount:
          oneOf:
            - $ref: "#/components/schemas/Money"
            - type: "null"
          description: CR-3 per-period cap
        effective_from: { type: [string, "null"], format: date }
        version: { type: integer }
        status: { $ref: "#/components/schemas/CatalogStatus" }
        tiers:
          type: array
          items: { $ref: "#/components/schemas/PricingTier" }
    PricingModelCreate:
      type: object
      required: [name, pricing_type]
      properties:
        name: { type: string }
        pricing_type: { $ref: "#/components/schemas/PricingType" }
        meter_id: { type: [string, "null"], format: uuid }
        config: { type: [object, "null"] }
        minimum_amount: { oneOf: [{ $ref: "#/components/schemas/Money" }, { type: "null" }] }
        maximum_amount: { oneOf: [{ $ref: "#/components/schemas/Money" }, { type: "null" }] }
        effective_from: { type: string, format: date }
        tiers:
          type: array
          items: { $ref: "#/components/schemas/PricingTier" }
    PricingTier:
      type: object
      properties:
        id: { type: string, format: uuid }
        from_qty: { $ref: "#/components/schemas/Decimal" }
        to_qty:
          oneOf:
            - $ref: "#/components/schemas/Decimal"
            - type: "null"
          description: null = unbounded
        price_per_unit: { $ref: "#/components/schemas/Money" }
        sort_order: { type: integer }

    RateCard:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        effective_date: { type: string, format: date }
        status: { $ref: "#/components/schemas/CatalogStatus" }
        rates:
          type: array
          items: { $ref: "#/components/schemas/RateCardRate" }
    RateCardRate:
      type: object
      properties:
        id: { type: string, format: uuid }
        rate_card_id: { type: string, format: uuid }
        meter_id: { type: string, format: uuid }
        model_name:
          type: [string, "null"]
          description: LLM model for matrix pricing
        token_type:
          oneOf:
            - $ref: "#/components/schemas/TokenType"
            - type: "null"
        rate: { $ref: "#/components/schemas/Money" }
        unit_label: { type: string }
    RateCardRateCreate:
      type: object
      required: [meter_id, rate, unit_label]
      properties:
        meter_id: { type: string, format: uuid }
        model_name: { type: string }
        token_type: { $ref: "#/components/schemas/TokenType" }
        rate: { $ref: "#/components/schemas/Money" }
        unit_label: { type: string }

    Contract:
      type: object
      properties:
        id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        rate_card_id:
          type: [string, "null"]
          format: uuid
          description: If null, contract-specific rates must be added via POST /contracts/{id}/rates
        name: { type: string }
        commit_amount: { $ref: "#/components/schemas/Money" }
        auto_renew: { type: boolean }
        status: { $ref: "#/components/schemas/ContractStatus" }
        start_date: { type: [string, "null"], format: date }
        end_date: { type: [string, "null"], format: date }
        rates:
          type: array
          items: { $ref: "#/components/schemas/ContractRate" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ContractCreate:
      type: object
      required: [customer_id, name]
      properties:
        customer_id: { type: string, format: uuid }
        name: { type: string }
        rate_card_id: { type: [string, "null"], format: uuid }
        commit_amount: { $ref: "#/components/schemas/Money" }
        auto_renew: { type: boolean, default: false }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
    ContractRate:
      type: object
      properties:
        id: { type: string, format: uuid }
        contract_id: { type: string, format: uuid }
        meter_id: { type: string, format: uuid }
        model_name: { type: [string, "null"] }
        rate: { $ref: "#/components/schemas/Money" }
        unit_label: { type: string }
        effective_date: { type: string, format: date }
        expires_date: { type: [string, "null"], format: date }
    ContractRateCreate:
      type: object
      required: [meter_id, rate, effective_date]
      properties:
        meter_id: { type: string, format: uuid }
        model_name: { type: string }
        rate: { $ref: "#/components/schemas/Money" }
        unit_label: { type: string }
        effective_date: { type: string, format: date }
        expires_date: { type: string, format: date }

    # ─── Subscription ───
    Subscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        plan_id: { type: string, format: uuid }
        contract_id: { type: [string, "null"], format: uuid }
        status: { $ref: "#/components/schemas/SubscriptionStatus" }
        billing_period: { $ref: "#/components/schemas/BillingPeriod" }
        start_date: { type: string, format: date }
        end_date: { type: [string, "null"], format: date }
        current_period_start:
          type: string
          format: date-time
          description: Anniversary window — ADR-001 §3.1
        current_period_end: { type: string, format: date-time }
        cancel_at_period_end: { type: boolean }
        trial_end:
          type: [string, "null"]
          format: date-time
          description: CR-14
        created_at: { type: string, format: date-time }
    SubscriptionCreate:
      type: object
      required: [plan_id, billing_period]
      properties:
        plan_id: { type: string, format: uuid }
        billing_period: { $ref: "#/components/schemas/BillingPeriod" }
        start_date: { type: string, format: date }
        contract_id: { type: string, format: uuid }

    # ─── Billing (read models — written by the Go billing worker) ───
    Invoice:
      type: object
      description: >
        Written by the Go billing worker; read-only here. Naming per C-19
        (`invoice_number`, `total`, `credits_applied`); status per C-4.
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        subscription_id: { type: [string, "null"], format: uuid }
        invoice_number:
          type: string
          description: INV-YYYY-MM-NNN — NOT number (C-19)
        status: { $ref: "#/components/schemas/InvoiceStatus" }
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        subtotal: { $ref: "#/components/schemas/Money" }
        credits_applied:
          $ref: "#/components/schemas/Money"
          description: NOT credits (C-19)
        tax_rate: { $ref: "#/components/schemas/Money" }
        tax_amount: { $ref: "#/components/schemas/Money" }
        total:
          $ref: "#/components/schemas/Money"
          description: NOT amount (C-19)
        currency: { type: string }
        due_date: { type: [string, "null"], format: date }
        issued_at: { type: [string, "null"], format: date-time }
        paid_at: { type: [string, "null"], format: date-time }
        line_items:
          type: array
          items: { $ref: "#/components/schemas/InvoiceLineItem" }
    InvoiceLineItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        invoice_id: { type: string, format: uuid }
        meter_id: { type: [string, "null"], format: uuid }
        line_type: { $ref: "#/components/schemas/LineType" }
        description: { type: string }
        quantity: { $ref: "#/components/schemas/Decimal" }
        unit_price: { $ref: "#/components/schemas/Money" }
        amount: { $ref: "#/components/schemas/Money" }
        model:
          type: [string, "null"]
          description: LLM model attribution
        subscription_id:
          type: [string, "null"]
          format: uuid
          description: Attribution under CR-8 grouping
        rate_source:
          oneOf:
            - $ref: "#/components/schemas/RateSource"
            - type: "null"
        rate_source_id:
          type: [string, "null"]
          format: uuid
          description: Id of the resolved rate row — CR-1 reproducibility
    CreditNote:
      type: object
      description: CR-1/CR-4 correction primitive — issued invoices are never mutated.
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        invoice_id: { type: string, format: uuid }
        rerating_run_id: { type: [string, "null"], format: uuid }
        note_number: { type: string }
        kind:
          type: string
          enum: [credit, debit]
        amount: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        reason: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/CreditNoteStatus" }
        created_at: { type: string, format: date-time }

    # ─── Payments ───
    Payment:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        invoice_id: { type: [string, "null"], format: uuid }
        payment_method_id: { type: [string, "null"], format: uuid }
        amount: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        status: { $ref: "#/components/schemas/PaymentStatus" }
        collection_mode: { $ref: "#/components/schemas/CollectionMode" }
        failure_reason: { type: [string, "null"] }
        description: { type: [string, "null"] }
        payment_date: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
    PaymentRecordCreate:
      type: object
      required: [invoice_uuid, amount, currency, collection_mode]
      properties:
        invoice_uuid: { type: string, format: uuid }
        amount: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        collection_mode:
          type: string
          enum: [manual, wire]
          description: auto_charge is rejected — reserved for the billing worker (CR-6)
        payment_method_id: { type: string, format: uuid }
        reference:
          type: string
          description: Gateway/external reference (wire confirmation, check number)
        description: { type: string }

    PaymentMethod:
      type: object
      properties:
        id: { type: string, format: uuid }
        customer_id:
          type: string
          format: uuid
          description: Customer-attached (C-6)
        method_type: { $ref: "#/components/schemas/PaymentMethodType" }
        brand: { type: [string, "null"] }
        last4: { type: [string, "null"] }
        exp_month: { type: [integer, "null"] }
        exp_year: { type: [integer, "null"] }
        bank_name: { type: [string, "null"] }
        billing_name: { type: [string, "null"] }
        billing_address: { type: [object, "null"] }
        is_default: { type: boolean }
        status: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PaymentMethodCreate:
      type: object
      required: [method_type, gateway_token]
      properties:
        method_type: { $ref: "#/components/schemas/PaymentMethodType" }
        gateway_token:
          type: string
          description: Stripe token — raw card data is never sent or stored
        billing_name: { type: string }
        billing_address: { type: object }
        is_default: { type: boolean, default: false }

    # ─── Credits & wallet ───
    Credit:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/CreditType" }
        original_amount: { $ref: "#/components/schemas/Money" }
        remaining_amount:
          $ref: "#/components/schemas/Money"
          description: NOT remaining_balance (C-18)
        used_amount: { $ref: "#/components/schemas/Money" }
        priority: { type: integer }
        applicable_to: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/CreditStatus" }
        notes: { type: [string, "null"] }
        expires_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
    CreditGrant:
      type: object
      required: [amount, type]
      properties:
        amount: { $ref: "#/components/schemas/Money" }
        type: { $ref: "#/components/schemas/CreditType" }
        priority: { type: integer }
        applicable_to: { type: string }
        expires_at: { type: string, format: date-time }
        notes: { type: string }
    CreditLedgerEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        credit_id: { type: string, format: uuid }
        invoice_id: { type: [string, "null"], format: uuid }
        type:
          type: string
          enum: [grant, usage, adjustment, expired, revoked, refunded]
        amount: { $ref: "#/components/schemas/Money" }
        balance: { $ref: "#/components/schemas/Money" }
        description: { type: [string, "null"] }
        created_at: { type: string, format: date-time }

    Wallet:
      type: object
      description: >
        CR-2 prepaid wallet. Postgres record of truth; Redis is the real-time
        enforcement cache, reconciled nightly.
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        balance: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        low_balance_threshold: { oneOf: [{ $ref: "#/components/schemas/Money" }, { type: "null" }] }
        auto_topup_enabled: { type: boolean }
        topup_amount: { oneOf: [{ $ref: "#/components/schemas/Money" }, { type: "null" }] }
        topup_payment_method_id: { type: [string, "null"], format: uuid }
        status: { $ref: "#/components/schemas/WalletStatus" }
        updated_at: { type: string, format: date-time }
    WalletTransaction:
      type: object
      properties:
        id: { type: string, format: uuid }
        wallet_id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/WalletTransactionType" }
        amount: { $ref: "#/components/schemas/Money" }
        balance_after: { $ref: "#/components/schemas/Money" }
        payment_id: { type: [string, "null"], format: uuid }
        period_ref:
          type: [string, "null"]
          description: Burndown aggregation window
        created_at: { type: string, format: date-time }

    # ─── Usage proxy ───
    UsageSummary:
      type: object
      description: >
        Compact BFF presentation of the Go analytics API's org summary.
        Authoritative field-level upstream shape: `openapi/analytics.yaml`
        (`OrgSummary`, `GET /v1/orgs/{org_id}/summary`). The BFF does not
        duplicate or re-derive these figures — it forwards and reshapes.
      properties:
        org_id: { type: string, format: uuid }
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        total_events: { type: integer }
        total_tokens: { type: integer }
        total_cost: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        by_meter:
          type: array
          items:
            type: object
            properties:
              meter_id: { type: string, format: uuid }
              meter_name: { type: string }
              total_usage: { $ref: "#/components/schemas/Decimal" }
              total_cost: { $ref: "#/components/schemas/Money" }

    # ─── v1.2 Control-plane expansion ───
    DunningPolicy:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        enabled: { type: boolean }
        grace_days: { type: integer }
        retry_schedule:
          type: array
          items:
            type: object
            properties:
              day_offset: { type: integer }
              action: { type: string, enum: [email, retry_payment, suspend, escalate] }
        minimum_invoice_amount: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        updated_at: { type: string, format: date-time }
    DunningPolicyUpsert:
      type: object
      required: [enabled, grace_days, retry_schedule]
      properties:
        enabled: { type: boolean }
        grace_days: { type: integer, minimum: 0 }
        retry_schedule:
          type: array
          items:
            type: object
            required: [day_offset, action]
            properties:
              day_offset: { type: integer, minimum: 0 }
              action: { type: string, enum: [email, retry_payment, suspend, escalate] }
        minimum_invoice_amount: { $ref: "#/components/schemas/Money" }
        currency: { type: string }

    ReratingRun:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: [string, "null"], format: uuid }
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        reason: { type: string }
        status: { type: string, enum: [queued, running, completed, approved, failed, canceled] }
        affected_invoice_count: { type: integer }
        credit_total: { $ref: "#/components/schemas/Money" }
        debit_total: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        created_at: { type: string, format: date-time }
        completed_at: { type: [string, "null"], format: date-time }
    ReratingRunCreate:
      type: object
      required: [period_start, period_end, reason]
      properties:
        customer_id: { type: string, format: uuid }
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        reason: { type: string }
        dry_run: { type: boolean, default: true }

    RevenuePeriod:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
        status: { type: string, enum: [open, closing, closed, reopened] }
        recognized_revenue: { $ref: "#/components/schemas/Money" }
        deferred_revenue: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        closed_at: { type: [string, "null"], format: date-time }
    RevenuePeriodCloseRequest:
      type: object
      properties:
        close_reason: { type: string }
        force: { type: boolean, default: false }

    SimulationRun:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        scenario_name: { type: string }
        status: { type: string, enum: [queued, running, completed, failed] }
        input_snapshot: { type: object, additionalProperties: true }
        estimated_revenue: { $ref: "#/components/schemas/Money" }
        estimated_cost: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        created_at: { type: string, format: date-time }
        completed_at: { type: [string, "null"], format: date-time }
    SimulationRunCreate:
      type: object
      required: [scenario_name, period_start, period_end]
      properties:
        scenario_name: { type: string }
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        customer_ids:
          type: array
          items: { type: string, format: uuid }
        catalog_overrides: { type: object, additionalProperties: true }

    BillingGroup:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        customer_ids:
          type: array
          items: { type: string, format: uuid }
        invoice_owner_customer_id: { type: string, format: uuid }
        allocation_rule: { type: string, enum: [single_invoice, split_evenly, split_by_usage, custom] }
        status: { type: string, enum: [active, inactive] }
        created_at: { type: string, format: date-time }
    BillingGroupUpsert:
      type: object
      required: [name, customer_ids, invoice_owner_customer_id, allocation_rule]
      properties:
        name: { type: string }
        customer_ids:
          type: array
          items: { type: string, format: uuid }
        invoice_owner_customer_id: { type: string, format: uuid }
        allocation_rule: { type: string, enum: [single_invoice, split_evenly, split_by_usage, custom] }
        custom_allocations:
          type: object
          additionalProperties: { $ref: "#/components/schemas/Decimal" }
    BillingGroupPreviewRequest:
      type: object
      properties:
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
    BillingGroupPreview:
      type: object
      properties:
        billing_group_id: { type: string, format: uuid }
        invoice_total: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        allocations:
          type: array
          items:
            type: object
            properties:
              customer_id: { type: string, format: uuid }
              amount: { $ref: "#/components/schemas/Money" }
              usage_quantity: { $ref: "#/components/schemas/Decimal" }

    ExportConfig:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        target: { type: string, enum: [s3, gcs, snowflake, webhook] }
        dataset: { type: string, enum: [invoices, usage, payments, credits, audit_events, revenue] }
        schedule_cron: { type: [string, "null"] }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
    ExportConfigUpsert:
      type: object
      required: [name, target, dataset]
      properties:
        name: { type: string }
        target: { type: string, enum: [s3, gcs, snowflake, webhook] }
        dataset: { type: string, enum: [invoices, usage, payments, credits, audit_events, revenue] }
        destination_config: { type: object, additionalProperties: true }
        schedule_cron: { type: string }
        enabled: { type: boolean, default: true }
    ExportRun:
      type: object
      properties:
        id: { type: string, format: uuid }
        export_config_id: { type: string, format: uuid }
        status: { type: string, enum: [queued, running, succeeded, failed] }
        row_count: { type: integer }
        artifact_url: { type: [string, "null"], format: uri }
        started_at: { type: string, format: date-time }
        completed_at: { type: [string, "null"], format: date-time }

    ReportRunRequest:
      type: object
      required: [report_type]
      properties:
        report_type: { type: string, enum: [mrr, usage, ar_aging, revenue, credits, churn] }
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        filters: { type: object, additionalProperties: true }
        output_format: { type: string, enum: [json, csv, pdf], default: json }
    ReportRun:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        report_type: { type: string }
        status: { type: string, enum: [queued, running, succeeded, failed] }
        total_revenue: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        artifact_url: { type: [string, "null"], format: uri }
        created_at: { type: string, format: date-time }

    WebhookEndpoint:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
        status: { type: string, enum: [active, disabled] }
        secret_last4: { type: [string, "null"] }
        created_at: { type: string, format: date-time }
    WebhookEndpointCreate:
      type: object
      required: [url, events]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
        secret: { type: string, writeOnly: true }
        status: { type: string, enum: [active, disabled], default: active }
    WebhookDelivery:
      type: object
      properties:
        id: { type: string, format: uuid }
        webhook_id: { type: string, format: uuid }
        event_type: { type: string }
        status: { type: string, enum: [pending, delivered, failed, retrying] }
        attempt_count: { type: integer }
        response_status: { type: [integer, "null"] }
        delivered_at: { type: [string, "null"], format: date-time }

    Alert:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: [string, "null"], format: uuid }
        rule_id: { type: [string, "null"], format: uuid }
        severity: { type: string, enum: [info, warning, critical] }
        status: { type: string, enum: [open, acknowledged, resolved] }
        message: { type: string }
        triggered_at: { type: string, format: date-time }
    AlertRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        metric: { type: string }
        comparator: { type: string, enum: [gt, gte, lt, lte, eq] }
        threshold: { $ref: "#/components/schemas/Decimal" }
